                  "@type": "Offer",

              "@id": "https://keymoji.wtf/#org",
              "name": "Keymoji",
              "url": "https://keymoji.wtf/",
              "logo": "https://keymoji.wtf/images/keymoji-logo-11-2023-simple.png",
              "foundingLocation": "Switzerland",
              "description": "Swiss-made emoji password generator for secure, memorable passwords.",
              "contactPoint": {
                "@type": "ContactPoint",
                "contactType": "customer support",
                "url": "https://keymoji.wtf/"
              }
            },
            {
              "@type": "FAQPage",
              "mainEntity": [
                {
                  "@type": "Question",
                  "name": "What is Keymoji?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Keymoji is a free, emoji-based password generator. It creates memorable, secure passwords using emoji sequences in 15+ languages. You can also enable AI Story Mode to generate personalised emoji-password stories."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Are emoji passwords secure?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Yes. Emoji passwords significantly increase the entropy of your password by using a much larger character set than standard ASCII. They are also resistant to common dictionary attacks and AI-based guessing."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Is Keymoji free to use?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Keymoji has a free tier with daily generation limits and a Pro tier for unlimited generations, AI Story Mode, and advanced security features."
                  }
                },
                {
                  "@type": "Question",
                  "name": "How does the OTP login work?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Keymoji uses a passwordless, 7-digit OTP (One-Time Password) sent to your email. Enter the code in the app to log in or create an account — no passwords needed."
                  }
                }
              ]
            }
