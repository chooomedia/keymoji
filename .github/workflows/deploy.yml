name: Deploy to Production

on:
    push:
        branches:
            - staging
            - main
    workflow_dispatch:
        inputs:
            branch:
                description: 'Branch to deploy'
                required: true
                default: 'staging'
                type: choice
                options:
                    - staging
                    - main

# OPTIMIZATION: 
# - Versucht Artifacts von Build-Workflow zu verwenden
# - Baut lokal als Fallback (z.B. bei workflow_dispatch oder wenn Artifacts fehlen)

# Concurrency: Nur ein Deploy gleichzeitig pro Branch
concurrency:
    group: deploy-${{ github.ref }}
    cancel-in-progress: false

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Download build artifacts from Build workflow
              id: download-artifacts
              uses: dawidd6/action-download-artifact@v3
              with:
                  workflow: build.yml
                  workflow_conclusion: success
                  name: build-artifacts
                  if_no_artifact_found: warn
              continue-on-error: true

            - name: Set up Node.js (if building locally)
              if: steps.download-artifacts.outcome == 'failure' || github.event_name == 'workflow_dispatch'
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Build locally if artifacts not available
              if: steps.download-artifacts.outcome == 'failure' || github.event_name == 'workflow_dispatch'
              run: |
                  echo "⚠️ Artifacts not available, building locally..."
                  npm ci --legacy-peer-deps
                  
                  # SECURITY: Set webhook URLs from GitHub Secrets
                  # These are injected at build-time via VITE_ prefix for frontend access
                  
                  # Existing secrets (preserved for backward compatibility)
                  if [ -n "${{ secrets.WEBHOOK_BASE }}" ]; then
                    echo "VITE_N8N_URL=${{ secrets.WEBHOOK_BASE }}" >> .env.production
                  fi
                  if [ -n "${{ secrets.WEBHOOK_TEST_BASE }}" ]; then
                  echo "WEBHOOK_TEST_BASE=${{ secrets.WEBHOOK_TEST_BASE }}" >> .env.production
                  fi
                  
                  # SECURITY: Apertus webhook URL as secret (full URL)
                  # This is the secure way - URL is hidden from codebase
                  if [ -n "${{ secrets.WEBHOOK_APERTUS_TEST }}" ]; then
                    echo "VITE_WEBHOOK_APERTUS_TEST=${{ secrets.WEBHOOK_APERTUS_TEST }}" >> .env.production
                  else
                    echo "⚠️ WARNING: WEBHOOK_APERTUS_TEST secret not set! Using fallback URL (less secure)."
                  fi
                  
                  # SECURITY: Apertus n8n token for webhook authentication
                  # This token is required to authenticate requests to the Apertus webhook
                  if [ -n "${{ secrets.N8N_APERTUS_TOKEN }}" ]; then
                    echo "VITE_N8N_APERTUS_TOKEN=${{ secrets.N8N_APERTUS_TOKEN }}" >> .env.production
                  else
                    echo "⚠️ WARNING: N8N_APERTUS_TOKEN secret not set! Apertus API calls will fail."
                  fi
                  
                  npm run build

            - name: Verify build directory exists
              run: |
                  if [ ! -d "build" ]; then
                    echo "❌ Build directory not found! Cannot deploy."
                    exit 1
                  fi
                  echo "✅ Build directory found"

            - name: Create .htaccess file
              run: |
                  cat > build/.htaccess << 'EOL'
                  # Enable rewriting
                  RewriteEngine On

                  # Force HTTPS (wichtig für Social Sharing)
                  RewriteCond %{HTTPS} off
                  RewriteRule ^(.*)$ https://%{HTTP_HOST}/$1 [R=301,L]

                  # Redirect root to /en for better SEO
                  RewriteRule ^$ /en/ [R=301,L]

                  # Social Media Bot Detection und Prerendering
                  RewriteCond %{HTTP_USER_AGENT} (facebookexternalhit|Facebot|Twitterbot|LinkedInBot|WhatsApp|TelegramBot|Slackbot|Discordbot|Signal|embedly|quora|outbrain|pinterest|vkShare|W3C_Validator) [NC]
                  RewriteCond %{REQUEST_URI} !^/api
                  RewriteCond %{REQUEST_FILENAME} !-f
                  RewriteRule ^(.*)$ /social-preview.php?path=$1 [L]

                  # CRITICAL: Exclude static assets and API routes from routing
                  RewriteCond %{REQUEST_URI} ^/(static|images|fonts|api|favicon|manifest|robots|sitemap) [NC,OR]
                  RewriteCond %{REQUEST_URI} \.(js|css|png|jpg|jpeg|gif|svg|webp|ico|woff|woff2|ttf|eot|json|xml|txt|php)$ [NC]
                  RewriteRule ^ - [L]
                  
# IMPORTANT: Order matters! Two-segment routes must come before single-segment routes
# Handle language-prefixed routes with subpaths (e.g., /en/contact, /de/account)
# Pattern: /lang/route -> checks if /lang/route/index.html exists
                  RewriteCond %{REQUEST_FILENAME} !-f
RewriteCond %{REQUEST_FILENAME} !-d
                  RewriteCond %{REQUEST_URI} ^/([^/]+)/([^/]+)/?$
                  RewriteCond %{DOCUMENT_ROOT}/%1/%2/index.html -f
RewriteRule ^([^/]+)/([^/]+)/?$ /$1/$2/index.html [L]

# Handle single-segment routes (e.g., /en, /contact, /account)
# This handles both language home routes and non-language-prefixed routes
# Pattern: /segment -> checks if /segment/index.html exists
                  RewriteCond %{REQUEST_FILENAME} !-f
RewriteCond %{REQUEST_FILENAME} !-d
                  RewriteCond %{REQUEST_URI} ^/([^/]+)/?$
                  RewriteCond %{DOCUMENT_ROOT}/%1/index.html -f
RewriteRule ^([^/]+)/?$ /$1/index.html [L]

# SPA fallback: redirect all non-matching routes to root index.html
# This handles client-side routing for dynamic routes (blog posts, etc.)
# MUST be last - catches everything else for client-side routing
                  RewriteCond %{REQUEST_FILENAME} !-f
                  RewriteCond %{REQUEST_FILENAME} !-d
                  RewriteRule ^ index.html [QSA,L]

                  # Security Headers
                  <IfModule mod_headers.c>
                      Header set X-Content-Type-Options "nosniff"
                      Header set X-Frame-Options "SAMEORIGIN"
                      Header set X-XSS-Protection "1; mode=block"
                      Header set Referrer-Policy "strict-origin-when-cross-origin"
                      # Permissions-Policy: Nur unterstützte Features verwenden
                      # Entfernt unbekannte/experimentelle Features die Browser-Warnungen verursachen
                      Header set Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"
                      
                      # SEO-optimierte Headers
                      Header set X-Robots-Tag "index, follow"
                      Header set X-Sitemap-Location "https://keymoji.wtf/sitemap.xml"
                      
                      # Performance Headers
                      Header set X-DNS-Prefetch-Control "on"
                      Header set X-Download-Options "noopen"
                      Header set X-Permitted-Cross-Domain-Policies "none"
                  </IfModule>

                  # Set correct content type for JavaScript modules
                  <IfModule mod_mime.c>
                      AddType application/javascript .js
                      AddType text/css .css
                      AddType image/webp .webp
                      AddCharset UTF-8 .html .css .js
                  </IfModule>

                  # Compression
                  <IfModule mod_deflate.c>
                      AddOutputFilterByType DEFLATE text/html text/plain text/xml application/xml application/xhtml+xml text/javascript text/css application/javascript application/x-javascript image/svg+xml
                  </IfModule>

                  # Caching with shorter times for HTML
                  <IfModule mod_expires.c>
                      ExpiresActive On
                      
                      # HTML - kurze Cache-Zeit für Updates
                      ExpiresByType text/html "access plus 1 hour"
                      ExpiresByType application/xhtml+xml "access plus 1 hour"
                      
                      # CSS und JavaScript - längere Cache-Zeit
                      ExpiresByType text/css "access plus 1 month"
                      ExpiresByType application/javascript "access plus 1 month"
                      
                      # Bilder - sehr lange Cache-Zeit
                      ExpiresByType image/jpeg "access plus 1 year"
                      ExpiresByType image/png "access plus 1 year"
                      ExpiresByType image/gif "access plus 1 year"
                      ExpiresByType image/svg+xml "access plus 1 year"
                      ExpiresByType image/webp "access plus 1 year"
                      ExpiresByType image/x-icon "access plus 1 year"
                      ExpiresByType image/vnd.microsoft.icon "access plus 1 year"
                      
                      # Fonts
                      ExpiresByType font/ttf "access plus 1 year"
                      ExpiresByType font/woff "access plus 1 year"
                      ExpiresByType font/woff2 "access plus 1 year"
                      ExpiresByType font/eot "access plus 1 year"
                      ExpiresByType font/otf "access plus 1 year"
                      
                      # Manifest und JSON
                      ExpiresByType application/manifest+json "access plus 1 week"
                      ExpiresByType application/json "access plus 1 day"
                  </IfModule>

                  # Cache-Control Headers
                  <IfModule mod_headers.c>
                      # Versionierte Assets können lange gecacht werden
                      <FilesMatch "\.(css|js|woff2?|ttf|eot|otf)$">
                          Header set Cache-Control "public, max-age=31536000, immutable"
                      </FilesMatch>
                      
                      # Bilder
                      <FilesMatch "\.(jpg|jpeg|png|gif|svg|webp|ico)$">
                          Header set Cache-Control "public, max-age=31536000"
                      </FilesMatch>
                      
                      # HTML sollte revalidiert werden
                      <FilesMatch "\.(html)$">
                          Header set Cache-Control "no-cache, must-revalidate"
                      </FilesMatch>
                      
                      # SEO-optimierte Cache-Headers
                      <FilesMatch "\.(xml|txt)$">
                          Header set Cache-Control "public, max-age=86400"
                      </FilesMatch>
                  </IfModule>
                  EOL

            - name: Create social-preview.php
              run: |
                  cat > build/social-preview.php << 'EOL'
                  <?php
                  // Social Media Preview Generator
                  header('Content-Type: text/html; charset=utf-8');

                  $path = $_GET['path'] ?? '';
                  $userAgent = $_SERVER['HTTP_USER_AGENT'] ?? '';

                  // SEO-optimierte Meta-Daten basierend auf Pfad
                  $seoData = [
                      '/' => [
                          'title' => 'Keymoji - Emoji Password Generator',
                          'description' => 'Generate secure, AI-resistant emoji passwords. Create memorable passwords with emojis in 15+ languages.',
                          'image' => '/images/keymoji-social-media-banner-10-2024-min.png'
                      ],
                      '/versions' => [
                          'title' => 'Keymoji Version History & Updates',
