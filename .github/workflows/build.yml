name: Build

on:
    push:
        branches: [staging, frontend, master, main]
    pull_request:
        branches: [staging, frontend, master, main]
    workflow_dispatch:

# OPTIMIZATION: Verhindere doppelte Builds
# - build.yml: Einziger Workflow der tatsächlich baut
# - tests.yml: Nur Lint/TypeScript, kein Build
# - deploy.yml: Wartet auf build.yml und verwendet Artifacts

# Concurrency: Nur ein Build gleichzeitig pro Branch
concurrency:
    group: build-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        name: Build Production
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20.x'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci --legacy-peer-deps

            - name: Run prebuild scripts
              run: npm run prebuild

            - name: Generate .env.production with secrets
              run: |
                  # SECURITY: Set webhook URLs from GitHub Secrets for build
                  # These are injected at build-time via VITE_ prefix for frontend access
                  
                  # Existing secrets (preserved for backward compatibility)
                  if [ -n "${{ secrets.WEBHOOK_BASE }}" ]; then
                    echo "VITE_N8N_URL=${{ secrets.WEBHOOK_BASE }}" > .env.production
                  fi
                  
                  # VITE_API_URL: Vercel backend URL for serverless functions (story, account, magic-link etc.)
                  # Must be set as GitHub Secret: VITE_API_URL = https://keymoji-git-master-chris-projects-018d256d.vercel.app
                  if [ -n "${{ secrets.VITE_API_URL }}" ]; then
                    echo "VITE_API_URL=${{ secrets.VITE_API_URL }}" >> .env.production
                    echo "✅ VITE_API_URL set from GitHub Secret."
                  else
                    echo "⚠️ WARNING: VITE_API_URL not set — Story Mode and API calls will fail on production!"
                  fi
                  if [ -n "${{ secrets.WEBHOOK_TEST_BASE }}" ]; then
                    echo "WEBHOOK_TEST_BASE=${{ secrets.WEBHOOK_TEST_BASE }}" >> .env.production
                  fi
                  
                  # SECURITY: Apertus webhook URL as secret (full URL)
                  # This is the secure way - URL is hidden from codebase
                  if [ -n "${{ secrets.WEBHOOK_APERTUS_TEST }}" ]; then
                    echo "VITE_WEBHOOK_APERTUS_TEST=${{ secrets.WEBHOOK_APERTUS_TEST }}" >> .env.production
                  else
                    echo "⚠️ WARNING: WEBHOOK_APERTUS_TEST secret not set! Using fallback URL (less secure)."
                  fi
                  
                  # SECURITY: Apertus token is now managed server-side via Vercel (N8N_APERTUS_TOKEN).
                  # The VITE_ prefix is intentionally removed — token must NOT be exposed in the client bundle.
                  # Story Mode requests go through /api/story (Vercel proxy) which injects the token server-side.
                  echo "✅ Apertus token is handled server-side via Vercel — no client-side secret needed."

            - name: Build project
              run: npm run build

            - name: Run postbuild scripts
              run: npm run postbuild

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: build-artifacts
                  path: |
                      build/
                      !build/**/*.map
                  retention-days: 7

            - name: Build size report
              run: |
                  echo "📦 Build Size Report" >> $GITHUB_STEP_SUMMARY
                  echo "===================" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY

                  if [ -d "build" ]; then
                    TOTAL_SIZE=$(du -sh build | cut -f1)
                    JS_SIZE=$(du -sh build/static/js 2>/dev/null | cut -f1 || echo "N/A")
                    CSS_SIZE=$(du -sh build/static/css 2>/dev/null | cut -f1 || echo "N/A")
                    
                    echo "Total: $TOTAL_SIZE" >> $GITHUB_STEP_SUMMARY
                    echo "JS: $JS_SIZE" >> $GITHUB_STEP_SUMMARY
                    echo "CSS: $CSS_SIZE" >> $GITHUB_STEP_SUMMARY
                    echo "" >> $GITHUB_STEP_SUMMARY
                    
                    echo "📊 Total Build Size: $TOTAL_SIZE"
                    echo "📊 JS Size: $JS_SIZE"
                    echo "📊 CSS Size: $CSS_SIZE"
                  else
                    echo "❌ Build directory not found!" >> $GITHUB_STEP_SUMMARY
                    exit 1
                  fi

            - name: Check build quality
              run: |
                  echo "🔍 Checking build quality..."

                  # Check for source maps (should exist in production)
                  if [ -f "build/static/js/*.map" ]; then
                    echo "✅ Source maps found"
                  else
                    echo "⚠️ No source maps found (may be expected)"
                  fi

                  # Check for index.html
                  if [ -f "build/index.html" ]; then
                    echo "✅ index.html found"
                  else
                    echo "❌ index.html not found!"
                    exit 1
                  fi

                  echo "✅ Build quality check passed"

    deploy:
        name: Deploy to Production
        runs-on: ubuntu-latest
        needs: build
        if: github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main'

        steps:
            - name: Download build artifacts
              uses: actions/download-artifact@v4
              with:
                  name: build-artifacts
                  path: ./build

            - name: Create .htaccess file
              run: |
                  cat > build/.htaccess << 'EOL'
                  # Enable rewriting
                  RewriteEngine On

                  # Force HTTPS
                  RewriteCond %{HTTPS} off
                  RewriteRule ^(.*)$ https://%{HTTP_HOST}/$1 [R=301,L]

                  # Redirect root to /en
                  RewriteRule ^$ /en/ [R=301,L]

                  # Social Media Bot Detection
                  RewriteCond %{HTTP_USER_AGENT} (facebookexternalhit|Facebot|Twitterbot|LinkedInBot|WhatsApp|TelegramBot|Slackbot|Discordbot|Signal|embedly|quora|outbrain|pinterest|vkShare|W3C_Validator) [NC]
                  RewriteCond %{REQUEST_URI} !^/api
                  RewriteCond %{REQUEST_FILENAME} !-f
                  RewriteRule ^(.*)$ /social-preview.php?path=$1 [L]

                  # Exclude static assets
                  RewriteCond %{REQUEST_URI} ^/(static|images|fonts|api|favicon|manifest|robots|sitemap) [NC,OR]
                  RewriteCond %{REQUEST_URI} \.(js|css|png|jpg|jpeg|gif|svg|webp|ico|woff|woff2|ttf|eot|json|xml|txt|php)$ [NC]
                  RewriteRule ^ - [L]

                  # Language + subroute (e.g. /en/contact)
                  RewriteCond %{REQUEST_FILENAME} !-f
                  RewriteCond %{REQUEST_FILENAME} !-d
                  RewriteCond %{REQUEST_URI} ^/([^/]+)/([^/]+)/?$
                  RewriteCond %{DOCUMENT_ROOT}/%1/%2/index.html -f
                  RewriteRule ^([^/]+)/([^/]+)/?$ /$1/$2/index.html [L]

                  # Single segment (e.g. /en)
                  RewriteCond %{REQUEST_FILENAME} !-f
                  RewriteCond %{REQUEST_FILENAME} !-d
                  RewriteCond %{REQUEST_URI} ^/([^/]+)/?$
                  RewriteCond %{DOCUMENT_ROOT}/%1/index.html -f
                  RewriteRule ^([^/]+)/?$ /$1/index.html [L]

                  # SPA fallback
                  RewriteCond %{REQUEST_FILENAME} !-f
                  RewriteCond %{REQUEST_FILENAME} !-d
                  RewriteRule ^ index.html [QSA,L]

                  # Security Headers
                  <IfModule mod_headers.c>
                      Header set X-Content-Type-Options "nosniff"
                      Header set X-Frame-Options "SAMEORIGIN"
                      Header set X-XSS-Protection "1; mode=block"
                      Header set Referrer-Policy "strict-origin-when-cross-origin"
                      Header set Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"
                      Header set X-Robots-Tag "index, follow"
                      Header set X-DNS-Prefetch-Control "on"

                      # HTML files: never cache — ensures fresh chunk references after deploy
                      <FilesMatch "\.(html)$">
                          Header set Cache-Control "no-store, no-cache, must-revalidate, max-age=0"
                          Header set Pragma "no-cache"
                          Header set Expires "0"
                      </FilesMatch>

                      # Hashed static assets (JS/CSS with contenthash): immutable long-term cache
                      <FilesMatch "\.(js|css)$">
                          Header set Cache-Control "public, max-age=31536000, immutable"
                      </FilesMatch>
                  </IfModule>

                  # MIME types
                  <IfModule mod_mime.c>
                      AddType application/javascript .js
                      AddType text/css .css
                      AddType image/webp .webp
                      AddCharset UTF-8 .html .css .js
                  </IfModule>

                  # Compression
                  <IfModule mod_deflate.c>
                      AddOutputFilterByType DEFLATE text/html text/plain text/xml application/xml application/xhtml+xml text/javascript text/css application/javascript application/x-javascript image/svg+xml
                  </IfModule>

                  # Caching (fallback for servers without mod_headers)
                  <IfModule mod_expires.c>
                      ExpiresActive On
                      ExpiresByType text/html "access plus 0 seconds"
                      ExpiresByType text/css "access plus 1 year"
                      ExpiresByType application/javascript "access plus 1 year"
                      ExpiresByType image/jpeg "access plus 1 year"
                      ExpiresByType image/png "access plus 1 year"
                      ExpiresByType image/svg+xml "access plus 1 year"
                      ExpiresByType image/webp "access plus 1 year"
                      ExpiresByType font/woff2 "access plus 1 year"
                  </IfModule>
                  EOL

            - name: Verify build before deploy
              run: |
                  if [ ! -f "build/index.html" ]; then
                    echo "❌ build/index.html not found!"
                    exit 1
                  fi
                  echo "✅ Ready to deploy"

            - name: 📂 Deploy via FTP (attempt 1)
              id: ftp_deploy_1
              continue-on-error: true
              uses: SamKirkland/FTP-Deploy-Action@v4.3.4
              with:
                  server: ${{ secrets.HOST }}
                  username: ${{ secrets.USERNAME }}
                  password: ${{ secrets.PASSWORD }}
                  server-dir: ${{ secrets.SERVERDIR }}
                  local-dir: ./build/
                  exclude: |
                      **/.git*
                      **/.git*/**
                      **/node_modules/**
                  log-level: verbose
                  timeout: 300000
                  dangerous-clean-slate: false

            - name: ⏳ Wait before retry
              if: steps.ftp_deploy_1.outcome == 'failure'
              run: |
                  echo "⚠️ FTP attempt 1 failed, waiting 30s before retry..."
                  sleep 30

            - name: 📂 Deploy via FTP (attempt 2)
              if: steps.ftp_deploy_1.outcome == 'failure'
              id: ftp_deploy_2
              continue-on-error: true
              uses: SamKirkland/FTP-Deploy-Action@v4.3.4
              with:
                  server: ${{ secrets.HOST }}
                  username: ${{ secrets.USERNAME }}
                  password: ${{ secrets.PASSWORD }}
                  server-dir: ${{ secrets.SERVERDIR }}
                  local-dir: ./build/
                  exclude: |
                      **/.git*
                      **/.git*/**
                      **/node_modules/**
                  log-level: verbose
                  timeout: 300000
                  dangerous-clean-slate: false

            - name: ⏳ Wait before final retry
              if: steps.ftp_deploy_1.outcome == 'failure' && steps.ftp_deploy_2.outcome == 'failure'
              run: |
                  echo "⚠️ FTP attempt 2 failed, waiting 60s before final retry..."
                  sleep 60

            - name: 📂 Deploy via FTP (attempt 3 - final)
              if: steps.ftp_deploy_1.outcome == 'failure' && steps.ftp_deploy_2.outcome == 'failure'
              uses: SamKirkland/FTP-Deploy-Action@v4.3.4
              with:
                  server: ${{ secrets.HOST }}
                  username: ${{ secrets.USERNAME }}
                  password: ${{ secrets.PASSWORD }}
                  server-dir: ${{ secrets.SERVERDIR }}
                  local-dir: ./build/
                  exclude: |
                      **/.git*
                      **/.git*/**
                      **/node_modules/**
                  log-level: verbose
                  timeout: 300000
                  dangerous-clean-slate: false
