name: Version & Tagging

on:
  push:
    branches: [ staging, frontend, master ]
    paths:
      - 'package.json'
      - 'src/utils/version.js'
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  check-version:
    name: Check Version Consistency
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for tags
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      
      - name: Check version consistency
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          # Cross-platform version extraction
          VERSION_JS=$(grep -E "export const appVersion = ['\"]" src/utils/version.js | sed -E "s/.*['\"]([^'\"]+)['\"].*/\1/" || echo "")
          
          echo "📦 package.json version: $PACKAGE_VERSION"
          echo "📦 src/utils/version.js version: $VERSION_JS"
          
          if [ "$PACKAGE_VERSION" != "$VERSION_JS" ]; then
            echo "❌ Version mismatch!"
            exit 1
          fi
          
          echo "✅ Versions match!"
      
      - name: Check if tag exists
        id: check_tag
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG="v${PACKAGE_VERSION}"
          
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "⚠️  Tag $TAG already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "✅ Tag $TAG does not exist yet"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT

  create-tag:
    name: Create Version Tag
    runs-on: ubuntu-latest
    needs: check-version
    if: needs.check-version.outputs.exists == 'false'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      
      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
      
      - name: Create Git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Version ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.tag }}"
      
      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          release_name: Release ${{ steps.version.outputs.tag }}
          body: |
            ## Version ${{ steps.version.outputs.version }}
            
            Automated release from CI/CD pipeline.
            
            ### Changes
            See commit history for detailed changes.
          draft: false
          prerelease: false

  bump-version:
    name: Bump Version (Manual)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      
      - name: Bump version
        run: |
          node scripts/bump-version.js ${{ github.event.inputs.version_type }}
      
      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src/utils/version.js
          git commit -m "chore: bump version to $(node -p "require('./package.json').version")"
          git push origin ${{ github.ref_name }}

